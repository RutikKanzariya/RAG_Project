<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAG AI Assistant</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h1>📚 RAG Assistant</h1>

        <div class="upload-card">

            <label for="fileInput">

                <i class="fa-solid fa-cloud-arrow-up"></i>

                <h3>Upload Document</h3>

                <p>PDF • TXT</p>

            </label>

            <input
            type="file"
            id="fileInput"
            accept=".pdf,.txt"
            hidden>

        </div>

        <div class="url-box">

            <input
            type="text"
            id="url"
            placeholder="Paste Website URL">

            <button id="urlBtn">

                Add

            </button>

        </div>

        <h3 class="title">

            Uploaded Files

        </h3>

        <div id="files">

        </div>

    </aside>


    <!-- Chat -->

    <main class="chat">

        <header>

            <h2>

                🤖 AI Assistant

            </h2>

            <button id="clearBtn">

                Clear Chat

            </button>

        </header>

        <section
        id="chatBox">

            <div class="ai message">

                Hello 👋

                Upload your documents and ask me anything.

            </div>

        </section>

        <footer>

            <textarea
            id="question"
            placeholder="Ask about your documents..."></textarea>

            <button id="send">

                <i class="fa-solid fa-paper-plane"></i>

            </button>

        </footer>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
